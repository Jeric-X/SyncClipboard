name: win-release

permissions:
  contents: write

on:
  workflow_call:

jobs:
  package:
    uses: ./.github/workflows/win-package.yml

  release-windows:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        cpu: [x64, arm64]
        package-type: [portable, installer]
        include:
          - package-type: portable
            package-ext: .zip
          - package-type: installer
            package-ext: .exe

    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download last-job-built change log
        uses: actions/download-artifact@v8
        with:
          name: feature

      - name: Download package SyncClipboard_win_${{ matrix.cpu }}_${{ matrix.package-type }}
        uses: actions/download-artifact@v8
        with:
          name: SyncClipboard_win_${{ matrix.cpu }}_${{ matrix.package-type }}${{ matrix.package-ext }}

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          artifacts: SyncClipboard_win_${{ matrix.cpu }}_${{ matrix.package-type }}${{ matrix.package-ext }}
          bodyFile: feature.txt
