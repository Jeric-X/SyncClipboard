name: server-release

permissions:
  contents: write

on:
  workflow_call:

jobs:
  server-build:
    uses: ./.github/workflows/server-build.yml

  server-release:
    needs: server-build
    runs-on: ubuntu-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Sanitize Docker tag name
      id: sanitize-tag
      run: |
        tag="${{ github.ref_name }}"
        tag=$(echo "$tag" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^[.-]*//')
        tag="${tag:-branch}"
        echo "tag=$tag" >> $GITHUB_OUTPUT

    - name: Build and push Docker image with branch tag
      uses: docker/build-push-action@v7
      with:
        context: "{{defaultContext}}:src"
        file: SyncClipboard.Server/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          jericx/syncclipboard-server:${{ steps.sanitize-tag.outputs.tag }}
   
    - name: Build and push Docker image with version and latest tag
      if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'beta') }} 
      uses: docker/build-push-action@v7
      with:
        context: "{{defaultContext}}:src"
        file: SyncClipboard.Server/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          jericx/syncclipboard-server:latest

    # - name: Update Docker Hub Description
    #   if: startsWith(github.ref, 'refs/tags/')
    #   uses: peter-evans/dockerhub-description@v4
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}
    #     repository: jericx/syncclipboard-server
    #     readme-filepath: src/SyncClipboard.Server/README_DOCKER.md

    - name: Download last-job-built artifact SyncClipboard.Server
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/download-artifact@v8
      with:
        name: SyncClipboard.Server
        path: Server/

    - name: Zip SyncClipboard.Server
      if: startsWith(github.ref, 'refs/tags/')
      run: 7z a SyncClipboard.Server.zip ./Server/publish/*

    - name: Release to gh
      if: startsWith(github.ref, 'refs/tags/')
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        draft: true
        prerelease: ${{ contains(github.ref_name, 'beta') }}
        artifacts: SyncClipboard.Server.zip